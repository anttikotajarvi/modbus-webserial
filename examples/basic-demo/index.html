<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>modbus-webserial / Basic Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }
      button {
        padding: 0.4rem 0.8rem;
        margin-right: 0.6rem;
      }
      input {
        width: 4rem;
        text-align: center;
      }
      pre {
        background: #f7f7f7;
        padding: 0.8rem;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <h1>modbus-webserial / Basic Demo</h1>

    <button id="btnConnect">🔌 Connect</button>
    <button id="btnRead" disabled>🔍 Read HR 0–1</button>
    <button id="btnWrite" disabled>✏️ Write HR 0–1</button>

    <p>
      Reg 0 <input id="reg0" type="number" value="0" /> Reg 1
      <input id="reg1" type="number" value="0" />
    </p>

    <pre id="log"></pre>
    <script>
      /**
       *  Allow importing modbus-webserial from a different URL
       */
      const params = new URLSearchParams(location.search);
      const src =
        params.get("src") ?? "https://unpkg.com/modbus-webserial/dist/index.js";

      const map = {
        imports: {
          "modbus-webserial": src,
        },
      };

      const el = document.createElement("script");
      el.type = "importmap";
      el.textContent = JSON.stringify(map);

      document.currentScript.after(el);

      window.__modbusSource = src;
      console.log("loading modbus-webserial from:", src);
    </script>
    <script type="module">
      import { ModbusRTU, BUILD_INFO } from "modbus-webserial";
      if (BUILD_INFO) {
        console.log("modbus-webserial build info:", BUILD_INFO);
      }
      // Populate footer
      const footer = document.getElementById("build-info");

      if (footer) {
        const src = window.__modbusSource ?? "unknown";

        const hash = BUILD_INFO?.commit ?? "unknown";
        const version = BUILD_INFO?.version ?? "unknown";
        const time = BUILD_INFO?.buildTime ?? "unknown";

        footer.textContent = `modbus-webserial v${version} | build ${hash} | ${time} | loaded from ${src}`;
      }

      const log = (msg) => {
        document.getElementById("log").textContent += msg + "\n";
      };

      let client;
      const btnConnect = document.getElementById("btnConnect");
      const btnRead = document.getElementById("btnRead");
      const btnWrite = document.getElementById("btnWrite");
      const reg0 = document.getElementById("reg0");
      const reg1 = document.getElementById("reg1");

      // Connect
      btnConnect.onclick = async () => {
        try {
          client = await ModbusRTU.openWebSerial({ baudRate: 9600 });
          client.setID(1);
          log("✔️  Connected");
          const info = client.getPort().getInfo();
          if (info.usbVendorId || info.usbProductId) {
            const parts = [];
            if (info.usbVendorId)
              parts.push(`VID=0x${info.usbVendorId.toString(16)}`);
            if (info.usbProductId)
              parts.push(`PID=0x${info.usbProductId.toString(16)}`);
            log(`🔎 ${parts.join(" ")}`);
          }
          btnRead.disabled = btnWrite.disabled = false;
        } catch (e) {
          log("❌ " + e.message);
        }
      };
      // Read registers 0 and 1
      btnRead.onclick = async () => {
        try {
          const { data } = await client.readHoldingRegisters(0, 2);
          reg0.value = data[0];
          reg1.value = data[1];
          log(`📥  Read  HR0=${data[0]}  HR1=${data[1]}`);
        } catch (e) {
          log("❌ " + e.message);
        }
      };
      // Write registers 0 and 1
      btnWrite.onclick = async () => {
        try {
          const vals = [Number(reg0.value), Number(reg1.value)];
          await client.writeRegisters(0, vals);
          log(`📤  Wrote HR0=${vals[0]}  HR1=${vals[1]}`);
        } catch (e) {
          log("❌ " + e.message);
        }
      };
    </script>
    <footer
      id="build-info"
      style="
        margin-top: 3rem;
        padding-top: 1rem;
        border-top: 1px solid #ddd;
        font-size: 0.9em;
        color: #555;
      "
    ></footer>
  </body>
</html>
